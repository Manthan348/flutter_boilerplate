name: starter_lib
description: Reusable Flutter + GetX starter boilerplate for new applications.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  dio: ^5.9.2
  shared_preferences: ^2.2.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
